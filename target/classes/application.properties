spring.application.name=inventory
server.port=8086

# H2
spring.datasource.url=jdbc:h2:mem:inventorydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Low stock threshold
inventory.low.stock.threshold=10
management.endpoints.web.exposure.include=health,info,metrics
logging.level.com.inventory=DEBUG

# ── Security Enhancements ─────────────────────────────────────────────────
# Enhancement 1: JWT Secret (change in production!)
security.jwt.secret=change-me-in-production-must-be-at-least-32-chars-long
# Enhancement 4: Encryption Key (AES-256, 32 chars)
security.encryption.key=change-me-encryption-key-32chars!
# Enhancement 2: Rate Limiting
security.rate-limit.requests-per-minute=100
# Enhancement 6: GDPR
security.gdpr.data-retention-days=730
security.gdpr.anonymize-after-days=365
# Enhancement 5: PCI DSS (payment services)
security.pci.mask-card-numbers=true
security.pci.audit-all-transactions=true
# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/app
